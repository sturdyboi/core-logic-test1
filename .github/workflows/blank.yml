name: Mineflayer-AFK-Bot
on: 
  workflow_dispatch:
    inputs:
      resume_attempt:
        description: 'Resume attempt number'
        required: false
        default: '1'
      previous_run_id:
        description: 'Previous run ID to wait for'
        required: false
        default: ''

permissions:
  actions: write
  contents: read

env:
  RUNTIME_HOURS: 5
  OVERLAP_MINUTES: 2

jobs:
  run-mineflayer:
    runs-on: ubuntu-latest
    timeout-minutes: 310

    steps:
      - name: Wait for previous run to finish (if applicable)
        if: github.event.inputs.previous_run_id != ''
        run: |
          PREV_ID="${{ github.event.inputs.previous_run_id }}"
          echo "Waiting for previous run (ID: $PREV_ID) to complete..."

          while true; do
            STATUS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}"               -H "Accept: application/vnd.github.v3+json"               "https://api.github.com/repos/${{ github.repository }}/actions/runs/$PREV_ID"               | jq -r '.status')

            echo "Previous run status: $STATUS"

            if [ "$STATUS" = "completed" ]; then
              echo "✅ Previous run finished. Starting bot now..."
              break
            elif [ "$STATUS" = "null" ] || [ -z "$STATUS" ]; then
              echo "⚠️ Could not get status, assuming previous run finished"
              break
            fi

            echo "⏳ Still waiting... checking again in 5 seconds"
            sleep 5
          done

      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create Bot Script
        run: |
          cat > bot.js << 'BOTSCRIPT'
          const mineflayer = require('mineflayer');
          const fs = require('fs');

          process.on('uncaughtException', (err) => {
              if (err.message && err.message.includes('unknown chat format code')) {
                  console.log('[CHAT ERROR] Ignored malformed chat message');
                  return;
              }
              console.error('Uncaught:', err.message);
          });

          const botOptions = {
              host: 'ahsmpw.falixsrv.me',
              port: 21987,
              username: 'afkbot',
              version: false,
              hideErrors: true,
              checkTimeoutInterval: 60000
          };
          const password = 'afkbot';

          const startTime = Date.now();
          const RUNTIME_MS = 5 * 60 * 60 * 1000;
          const OVERLAP_MS = 2 * 60 * 1000;
          let shutdownInitiated = false;
          let nextRunTriggered = false;
          let wasKicked = false;
          let bot = null;
          let afkInterval = null;
          let hasSpawned = false;
          let hasLoggedKick = false;
          let falixTimer = null;
          let isReconnectingForFalix = false;

          function startBot() {
              if (shutdownInitiated) return;

              try {
                  bot = mineflayer.createBot(botOptions);
              } catch (e) {
                  setTimeout(startBot, 60000);
                  return;
              }

              bot.on('message', (message) => {
                  try {
                      let msg = '';
                      if (typeof message === 'string') {
                          msg = message.toLowerCase();
                      } else if (message && message.toString) {
                          msg = message.toString().toLowerCase();
                      } else {
                          return;
                      }

                      if (msg.includes('are you still there') && msg.includes('verify') && msg.includes('falixnodes')) {
                          console.log('[FALIX] Verification message detected! Will reconnect in 25min to cancel timer');

                          if (falixTimer) clearTimeout(falixTimer);

                          falixTimer = setTimeout(() => {
                              if (!shutdownInitiated && bot) {
                                  console.log('[FALIX] Reconnecting to cancel shutdown timer...');
                                  isReconnectingForFalix = true;
                                  try {
                                      bot.quit('FalixNodes AFK reset');
                                  } catch (e) {}

                                  setTimeout(() => {
                                      isReconnectingForFalix = false;
                                      startBot();
                                  }, 5000);
                              }
                          }, 25 * 60 * 1000);
                      }

                      if (msg.includes('register')) {
                          bot.chat(`/register ${password} ${password}`);
                      } else if (msg.includes('login') || msg.includes('log in')) {
                          bot.chat(`/login ${password}`);
                      }
                  } catch (e) {}
              });

              bot.once('spawn', () => {
                  if (!hasSpawned) {
                      console.log('[SPAWN] Bot spawned, starting anti-AFK');
                      hasSpawned = true;
                      startAntiAfk();
                  }
              });

              const checkInterval = setInterval(() => {
                  const elapsed = Date.now() - startTime;

                  if (elapsed >= (RUNTIME_MS - OVERLAP_MS) && !nextRunTriggered) {
                      nextRunTriggered = true;
                      console.log('[TRIGGER] 4h 58m - Starting next workflow');
                      fs.writeFileSync('.trigger_next_run', process.env.GITHUB_RUN_ID || 'unknown');
                  }

                  if (elapsed >= RUNTIME_MS && !shutdownInitiated) {
                      shutdownInitiated = true;
                      console.log('[TIMEOUT] 5 hours - Disconnecting');
                      if (falixTimer) clearTimeout(falixTimer);
                      fs.writeFileSync('.shutdown_complete', Date.now().toString());
                      clearInterval(checkInterval);
                      if (afkInterval) clearInterval(afkInterval);
                      try { bot.quit('Scheduled restart'); } catch (e) {}
                      setTimeout(() => process.exit(0), 2002);
                  }
              }, 30000);

              bot.on('kicked', (reason) => {
                  if (isReconnectingForFalix) return;

                  if (!hasLoggedKick) {
                      const reasonStr = typeof reason === 'string' ? reason : JSON.stringify(reason);
                      console.log(`[KICKED] ${reasonStr}`);
                      hasLoggedKick = true;
                  }
                  wasKicked = true;
                  if (afkInterval) clearInterval(afkInterval);

                  setTimeout(() => {
                      if (!shutdownInitiated) {
                          wasKicked = false;
                          startBot();
                      }
                  }, 60000);
              });

              bot.on('end', () => {
                  if (afkInterval) clearInterval(afkInterval);

                  if (isReconnectingForFalix) return;

                  if (wasKicked && !shutdownInitiated) {
                      wasKicked = false;
                      setTimeout(startBot, 60000);
                  }
              });

              bot.on('error', () => {});
          }

