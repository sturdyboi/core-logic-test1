name: Mineflayer-AFK-Bot
on: 
  workflow_dispatch:
    inputs:
      resume_attempt:
        description: 'Resume attempt number'
        required: false
        default: '1'
      previous_run_id:
        description: 'Previous run ID to wait for'
        required: false
        default: ''
      bot_count:
        description: 'Number of bots to run (1-10)'
        required: false
        default: '1'

permissions:
  actions: write
  contents: read

env:
  RUNTIME_HOURS: 5
  OVERLAP_MINUTES: 2

jobs:
  run-mineflayer:
    runs-on: ubuntu-latest
    timeout-minutes: 310

    steps:
      - name: Wait for previous run to finish (if applicable)
        if: github.event.inputs.previous_run_id != ''
        run: |
          PREV_ID="${{ github.event.inputs.previous_run_id }}"
          echo "Waiting for previous run (ID: $PREV_ID) to complete..."

          while true; do
            STATUS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}"               -H "Accept: application/vnd.github.v3+json"               "https://api.github.com/repos/${{ github.repository }}/actions/runs/$PREV_ID"               | jq -r '.status')

            echo "Previous run status: $STATUS"

            if [ "$STATUS" = "completed" ]; then
              echo "✅ Previous run finished. Starting bot now..."
              break
            elif [ "$STATUS" = "null" ] || [ -z "$STATUS" ]; then
              echo "⚠️ Could not get status, assuming previous run finished"
              break
            fi

            echo "⏳ Still waiting... checking again in 5 seconds"
            sleep 5
          done

      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Mineflayer
        run: npm install mineflayer

      - name: Start Bots and Monitor
        id: bot_run
        run: |
          echo "=========================================="
          echo "Starting Bots - Attempt #${{ github.event.inputs.resume_attempt || '1' }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Bot Count: ${{ github.event.inputs.bot_count || '1' }}"
          echo "Will trigger next run at 4h 58min, shutdown at 5 hours"
          echo "=========================================="

          export GITHUB_RUN_ID="${{ github.run_id }}"
          BOT_COUNT="${{ github.event.inputs.bot_count || '1' }}"

          # Validate bot count
          if [ "$BOT_COUNT" -lt 1 ] || [ "$BOT_COUNT" -gt 10 ]; then
              echo "⚠️ Invalid bot count: $BOT_COUNT. Using 1."
              BOT_COUNT=1
          fi

          echo "Starting $BOT_COUNT bot(s)..."

          # Start multiple bots with different indices
          for i in $(seq 0 $(($BOT_COUNT - 1))); do
              echo "Starting bot $((i + 1)) of $BOT_COUNT (index: $i)..."
              BOT_INDEX=$i node bot.js &
              sleep 2  # Small delay between bot starts to avoid connection throttle
          done

          # Monitor for trigger signal
          NEXT_TRIGGERED=false
          while true; do
              if [ -f ".trigger_next_run" ] && [ "$NEXT_TRIGGERED" = "false" ]; then
                  NEXT_TRIGGERED=true
                  echo "\n[MONITOR] Trigger signal detected! Will trigger next run now..."
                  echo "${{ github.run_id }}" > .next_run_should_wait_for
              fi

              # Check if any node processes are still running
              if ! pgrep -f "node bot.js" > /dev/null; then
                  echo "All bots have stopped."
                  break
              fi

              sleep 1
          done

          echo "Bot processes finished."

          if [ -f ".shutdown_complete" ]; then
              echo "✅ Clean shutdown detected"
              exit 0
          fi

          exit 0
        continue-on-error: true

      - name: Trigger Next Run (with overlap)
        if: always()
        id: trigger_next
        run: |
          if [ -f ".trigger_next_run" ] || [ -f ".next_run_should_wait_for" ]; then
              echo "Triggering next workflow run..."

              CURRENT_ATTEMPT="${{ github.event.inputs.resume_attempt || '1' }}"
              NEXT_ATTEMPT=$((CURRENT_ATTEMPT + 1))
              CURRENT_RUN_ID="${{ github.run_id }}"
              BOT_COUNT="${{ github.event.inputs.bot_count || '1' }}"

              printf '{"ref":"%s","inputs":{"resume_attempt":"%s","previous_run_id":"%s","bot_count":"%s"}}'                 "${{ github.ref }}" "$NEXT_ATTEMPT" "$CURRENT_RUN_ID" "$BOT_COUNT" > trigger_payload.json

              echo "Payload contents:"
              cat trigger_payload.json

              curl -X POST                 -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}"                 -H "Accept: application/vnd.github.v3+json"                 -H "Content-Type: application/json"                 -d @trigger_payload.json                 "https://api.github.com/repos/${{ github.repository }}/actions/workflows/blank.yml/dispatches"

              echo ""
              echo "✅ Triggered attempt #$NEXT_ATTEMPT (will wait for run $CURRENT_RUN_ID to finish)"
          else
              echo "No trigger signal found - not triggering next run"
          fi
        continue-on-error: true

      - name: Cleanup
        if: always()
        run: |
          rm -f .trigger_next_run .shutdown_complete .next_run_should_wait_for trigger_payload.json
          echo "\n=== Attempt #${{ github.event.inputs.resume_attempt || '1' }} Finished ==="
          echo "Next run should have been triggered and is waiting for this one to complete"
