name: Mineflayer-AFK-Bot
on:
  workflow_dispatch:
    inputs:
      resume_attempt:
        description: 'Resume attempt number'
        required: false
        default: '1'
      previous_run_id:
        description: 'Previous run ID to wait for'
        required: false
        default: ''
permissions:
  actions: write
  contents: read
jobs:
  run-mineflayer:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Wait for previous run to finish
        if: github.event.inputs.previous_run_id != ''
        run: |
          PREV_ID="${{ github.event.inputs.previous_run_id }}"
          echo "Waiting for previous run (ID: $PREV_ID) to complete..."
          while true; do
            STATUS=$(curl -s -H "Authorization: token ${{ secrets.GITHUBTOKEN }}" \
               -H "Accept: application/vnd.github.v3+json" \
               "https://api.github.com/repos/${{ github.repository }}/actions/runs/$PREV_ID" \
               | jq -r '.status')
            if [ "$STATUS" = "completed" ] || [ "$STATUS" = "null" ]; then
              echo "✅ Previous run finished. Starting bot..."
              break
            fi
            sleep 20
          done

      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create Bot Script
        run: |
          cat << 'EOF' > bot.js
          const mineflayer = require('mineflayer');
          const fs = require('fs');
          const botOptions = {
              host: 'ahsmpw.falixsrv.me',
              port: 21987,
              username: 'afkbot',
              version: false,
              hideErrors: true
          };
          const password = 'afkbot';
          const startTime = Date.now();
          const RUNTIME_MS = 5.83 * 60 * 60 * 1000; 
          const TRIGGER_MS = 5.7 * 60 * 60 * 1000;  
          
          let nextRunTriggered = false;
          let bot = null;

          function startBot() {
              bot = mineflayer.createBot(botOptions);
              
              bot.on('messagestr', (msg) => {
                  const lowMsg = msg.toLowerCase();
                  if (lowMsg.includes('register')) bot.chat(`/register ${password} ${password}`);
                  else if (lowMsg.includes('login') || lowMsg.includes('log in')) bot.chat(`/login ${password}`);
              });

              bot.once('spawn', () => {
                  console.log('[SPAWN] Bot online');
                  startAntiAfk();
              });

              setInterval(() => {
                  const elapsed = Date.now() - startTime;
                  if (elapsed >= TRIGGER_MS && !nextRunTriggered) {
                      nextRunTriggered = true;
                      fs.writeFileSync('.trigger_next_run', 'true');
                  }
                  if (elapsed >= RUNTIME_MS) {
                      try { bot.quit(); } catch (e) {}
                      setTimeout(() => process.exit(0), 2000);
                  }
              }, 30000);
          }

          function startAntiAfk() {
              let tickCount = 0;
              let circleDirection = 0;
              setInterval(() => {
                  if (!bot || !bot.entity) return;
                  tickCount++;

                  // Jump every 30s
                  bot.setControlState('jump', true);
                  setTimeout(() => { try { bot.setControlState('jump', false); } catch(e){} }, 500);

                  // Walk in circle logic
                  if (tickCount % 2 === 0) {
                      bot.setControlState('forward', circleDirection === 0);
                      bot.setControlState('right', circleDirection === 1);
                      bot.setControlState('back', circleDirection === 2);
                      bot.setControlState('left', circleDirection === 3);

                      const currentYaw = bot.entity.yaw;
                      bot.look(currentYaw - (Math.PI / 2), 0, false);
                      circleDirection = (circleDirection + 1) % 4;

                      setTimeout(() => {
                          try {
                              bot.setControlState('forward', false);
                              bot.setControlState('back', false);
                              bot.setControlState('left', false);
                              bot.setControlState('right', false);
                          } catch (e) {}
                      }, 2000);
                  }

                  // Swing arm
                  if (tickCount % 3 === 0) bot.swingArm();
              }, 30000);
          }
          startBot();
          EOF

      - name: Install Mineflayer
        run: npm install mineflayer

      - name: Start Bot and Monitor
        run: |
          node bot.js &
          BOT_PID=$!
          while kill -0 $BOT_PID 2>/dev/null; do
              if [ -f ".trigger_next_run" ]; then
                  echo "🚀 Dispatching next run..."
                  CURRENT_ATTEMPT="${{ github.event.inputs.resume_attempt || '1' }}"
                  NEXT_ATTEMPT=$((CURRENT_ATTEMPT + 1))
                  
                  curl -X POST -H "Authorization: token ${{ secrets.GITHUBTOKEN }}" \
                    -H "Accept: application/vnd.github.v3+json" \
                    "https://api.github.com/repos/${{ github.repository }}/actions/workflows/blank.yml/dispatches" \
                    -d "{\"ref\":\"main\", \"inputs\": {\"resume_attempt\": \"$NEXT_ATTEMPT\", \"previous_run_id\": \"${{ github.run_id }}\"}}"
                  
                  rm .trigger_next_run
              fi
              sleep 30
          done
          wait $BOT_PID
