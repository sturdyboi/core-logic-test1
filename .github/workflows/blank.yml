name: Mineflayer-AFK-Bot
on:
  workflow_dispatch:
    inputs:
      resume_attempt:
        description: 'Resume attempt number'
        required: false
        default: '1'
      previous_run_id:
        description: 'Previous run ID to wait for'
        required: false
        default: ''
permissions:
  actions: write
  contents: read
env:
  RUNTIME_HOURS: 5
  OVERLAP_MINUTES: 10
jobs:
  run-mineflayer:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Wait for previous run to finish (if applicable)
        if: github.event.inputs.previous_run_id != ''
        run: |
          PREV_ID="${{ github.event.inputs.previous_run_id }}"
          echo "Waiting for previous run (ID: $PREV_ID) to complete..."
          while true; do
            STATUS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
               -H "Accept: application/vnd.github.v3+json" \
               "https://api.github.com/repos/${{ github.repository }}/actions/runs/$PREV_ID" \
               | jq -r '.status')
            if [ "$STATUS" = "completed" ]; then
              echo "✅ Previous run finished. Starting bot now..."
              break
            fi
            sleep 10
          done

      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create Bot Script
        run: |
          cat << 'EOF' > bot.js
          const mineflayer = require('mineflayer');
          const fs = require('fs');
          const botOptions = {
              host: 'ahsmpw.falixsrv.me',
              port: 21987,
              username: 'afkbot',
              version: false,
              hideErrors: true
          };
          const password = 'afkbot';
          const startTime = Date.now();
          const RUNTIME_MS = 5.8 * 60 * 60 * 1000; // 5 hours 50 mins
          const TRIGGER_MS = 5.7 * 60 * 60 * 1000; // Trigger next run at 5 hours 42 mins
          
          let shutdownInitiated = false;
          let nextRunTriggered = false;
          let bot = null;

          function startBot() {
              bot = mineflayer.createBot(botOptions);
              
              bot.on('messagestr', (msg) => {
                  const lowMsg = msg.toLowerCase();
                  if (lowMsg.includes('register')) bot.chat(`/register ${password} ${password}`);
                  else if (lowMsg.includes('login')) bot.chat(`/login ${password}`);
              });

              bot.once('spawn', () => {
                  console.log('[SPAWN] Bot online');
                  startAntiAfk();
              });

              setInterval(() => {
                  const elapsed = Date.now() - startTime;
                  if (elapsed >= TRIGGER_MS && !nextRunTriggered) {
                      nextRunTriggered = true;
                      console.log('[TRIGGER] 5h 42m reached - Signalling next run');
                      fs.writeFileSync('.trigger_next_run', 'true');
                  }
                  if (elapsed >= RUNTIME_MS && !shutdownInitiated) {
                      shutdownInitiated = true;
                      console.log('[TIMEOUT] 5h 50m - Stopping bot');
                      fs.writeFileSync('.shutdown_complete', 'true');
                      try { bot.quit(); } catch (e) {}
                      setTimeout(() => process.exit(0), 2000);
                  }
              }, 30000);
          }

          function startAntiAfk() {
              setInterval(() => {
                  if (!bot || !bot.entity) return;
                  bot.setControlState('jump', true);
                  setTimeout(() => bot.setControlState('jump', false), 500);
                  bot.swingArm();
              }, 30000);
          }
          startBot();
          EOF

      - name: Install Mineflayer
        run: npm install mineflayer

      - name: Start Bot and Monitor
        run: |
          node bot.js &
          BOT_PID=$!
          while kill -0 $BOT_PID 2>/dev/null; do
              if [ -f ".trigger_next_run" ]; then
                  echo "🚀 Triggering next run via API..."
                  CURRENT_ATTEMPT="${{ github.event.inputs.resume_attempt || '1' }}"
                  NEXT_ATTEMPT=$((CURRENT_ATTEMPT + 1))
                  
                  curl -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                    -H "Accept: application/vnd.github.v3+json" \
                    "https://api.github.com/repos/${{ github.repository }}/actions/workflows/blank.yml/dispatches" \
                    -d "{\"ref\":\"main\", \"inputs\": {\"resume_attempt\": \"$NEXT_ATTEMPT\", \"previous_run_id\": \"${{ github.run_id }}\"}}"
                  
                  rm .trigger_next_run
              fi
              sleep 30
          done
          wait $BOT_PID
