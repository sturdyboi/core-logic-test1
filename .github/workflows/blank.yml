name: Mineflayer-AFK-Bot
on: 
  workflow_dispatch:
    inputs:
      resume_attempt:
        description: 'Resume attempt number'
        required: false
        default: '1'
      previous_run_id:
        description: 'Previous run ID to wait for'
        required: false
        default: ''

permissions:
  actions: write
  contents: read

env:
  RUNTIME_HOURS: 5
  OVERLAP_MINUTES: 2

jobs:
  run-mineflayer:
    runs-on: ubuntu-latest
    timeout-minutes: 310

    steps:
      - name: Wait for previous run to finish (if applicable)
        if: github.event.inputs.previous_run_id != ''
        run: |
          PREV_ID="${{ github.event.inputs.previous_run_id }}"
          echo "Waiting for previous run (ID: $PREV_ID) to complete..."

          while true; do
            STATUS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}"               -H "Accept: application/vnd.github.v3+json"               "https://api.github.com/repos/${{ github.repository }}/actions/runs/$PREV_ID"               | jq -r '.status')

            echo "Previous run status: $STATUS"

            if [ "$STATUS" = "completed" ]; then
              echo "✅ Previous run finished. Starting bot now..."
              break
            elif [ "$STATUS" = "null" ] || [ -z "$STATUS" ]; then
              echo "⚠️ Could not get status, assuming previous run finished"
              break
            fi

            echo "⏳ Still waiting... checking again in 5 seconds"
            sleep 5
          done

      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create Bot Script
        run: |
          cat << 'EOF' > bot.js
          const mineflayer = require('mineflayer');
          const fs = require('fs');

          const botOptions = {
              host: 'ahsmpw.falixsrv.me',
              port: 21987,
              username: 'afkbot',
              version: false,
              hideErrors: true
          };
          const password = 'afkbot';

          const startTime = Date.now();
          const RUNTIME_MS = 5 * 60 * 60 * 1000;
          const OVERLAP_MS = 2 * 60 * 1000;
          let shutdownInitiated = false;
          let nextRunTriggered = false;
          let wasKicked = false;
          let bot = null;
          let afkInterval = null;
          let hasSpawned = false;
          let hasLoggedKick = false;

          function startBot() {
              if (shutdownInitiated) return;

              bot = mineflayer.createBot(botOptions);

              bot.on('message', (message) => {
                  try {
                      const msg = message.toString().toLowerCase();
                      if (msg.includes('register')) {
                          bot.chat(`/register ${password} ${password}`);
                      } else if (msg.includes('login') || msg.includes('log in')) {
                          bot.chat(`/login ${password}`);
                      }
                  } catch (e) {}
              });

              bot.once('spawn', () => {
                  if (!hasSpawned) {
                      console.log('[SPAWN] Bot spawned, starting anti-AFK');
                      hasSpawned = true;
                      startAntiAfk();
                  }
              });

              const checkInterval = setInterval(() => {
                  const elapsed = Date.now() - startTime;

                  if (elapsed >= (RUNTIME_MS - OVERLAP_MS) && !nextRunTriggered) {
                      nextRunTriggered = true;
                      console.log('[TRIGGER] 4h 58m - Starting next workflow');
                      fs.writeFileSync('.trigger_next_run', process.env.GITHUB_RUN_ID || 'unknown');
                  }

                  if (elapsed >= RUNTIME_MS && !shutdownInitiated) {
                      shutdownInitiated = true;
                      console.log('[TIMEOUT] 5 hours - Disconnecting');
                      fs.writeFileSync('.shutdown_complete', Date.now().toString());
                      clearInterval(checkInterval);
                      if (afkInterval) clearInterval(afkInterval);
                      try { bot.quit('Scheduled restart'); } catch (e) {}
                      setTimeout(() => process.exit(0), 2000);
                  }
              }, 30000);

              bot.on('kicked', (reason) => {
                  if (!hasLoggedKick) {
                      console.log(`[KICKED] ${reason}`);
                      hasLoggedKick = true;
                  }
                  wasKicked = true;
                  if (afkInterval) clearInterval(afkInterval);

                  setTimeout(() => {
                      if (!shutdownInitiated) {
                          wasKicked = false;
                          startBot();
                      }
                  }, 60000);
              });

              bot.on('end', () => {
                  if (afkInterval) clearInterval(afkInterval);

                  if (wasKicked && !shutdownInitiated) {
                      wasKicked = false;
                      startBot();
                  }
              });

              bot.on('error', () => {});
          }

          function startAntiAfk() {
              let tickCount = 0;
              let circleDirection = 0;

              afkInterval = setInterval(() => {
                  try {
                      if (!bot || !bot.entity || shutdownInitiated) return;

                      tickCount++;

                      // Every 30 seconds: Jump
                      bot.setControlState('jump', true);
                      setTimeout(() => {
                          try { bot.setControlState('jump', false); } catch (e) {}
                      }, 500);

                      // Every 60 seconds: Walk in circle
                      if (tickCount % 2 === 0) {
                          switch(circleDirection) {
                              case 0:
                                  bot.setControlState('forward', true);
                                  bot.setControlState('back', false);
                                  bot.setControlState('left', false);
                                  bot.setControlState('right', false);
                                  break;
                              case 1:
                                  bot.setControlState('forward', false);
                                  bot.setControlState('back', false);
                                  bot.setControlState('left', false);
                                  bot.setControlState('right', true);
                                  break;
                              case 2:
                                  bot.setControlState('forward', false);
                                  bot.setControlState('back', true);
                                  bot.setControlState('left', false);
                                  bot.setControlState('right', false);
                                  break;
                              case 3:
                                  bot.setControlState('forward', false);
                                  bot.setControlState('back', false);
                                  bot.setControlState('left', true);
                                  bot.setControlState('right', false);
                                  break;
                          }

                          const currentYaw = bot.entity.yaw;
                          bot.look(currentYaw - (Math.PI / 2), 0, false);
                          circleDirection = (circleDirection + 1) % 4;

                          setTimeout(() => {
                              try {
                                  bot.setControlState('forward', false);
                                  bot.setControlState('back', false);
                                  bot.setControlState('left', false);
                                  bot.setControlState('right', false);
                              } catch (e) {}
                          }, 2000);
                      }

                      // Every 90 seconds: Swing arm (click)
                      if (tickCount % 3 === 0) {
                          bot.swingArm();
                      }

                  } catch (e) {}
              }, 30000);
          }

          startBot();
          EOF

      - name: Install Mineflayer
        run: npm install mineflayer

      - name: Start Bot and Monitor
        id: bot_run
        run: |
          echo "=========================================="
          echo "Starting Bot - Attempt #${{ github.event.inputs.resume_attempt || '1' }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Will trigger next run at 4h 58min, shutdown at 5 hours"
          echo "=========================================="

          export GITHUB_RUN_ID="${{ github.run_id }}"
          node bot.js &
          BOT_PID=$!

          NEXT_TRIGGERED=false
          while kill -0 $BOT_PID 2>/dev/null; do
              if [ -f ".trigger_next_run" ] && [ "$NEXT_TRIGGERED" = "false" ]; then
                  NEXT_TRIGGERED=true
                  echo "\n[MONITOR] Trigger signal detected! Will trigger next run now..."
                  echo "${{ github.run_id }}" > .next_run_should_wait_for
              fi
              sleep 1
          done

          wait $BOT_PID
          EXIT_CODE=$?

          echo "Bot exited with code: $EXIT_CODE"

          if [ -f ".shutdown_complete" ]; then
              echo "✅ Clean shutdown detected"
              exit 0
          fi

          exit $EXIT_CODE
        continue-on-error: true

      - name: Trigger Next Run (with overlap)
        if: always()
        id: trigger_next
        run: |
          if [ -f ".trigger_next_run" ] || [ -f ".next_run_should_wait_for" ]; then
              echo "Triggering next workflow run..."

              CURRENT_ATTEMPT="${{ github.event.inputs.resume_attempt || '1' }}"
              NEXT_ATTEMPT=$((CURRENT_ATTEMPT + 1)<response clipped><NOTE>Result is longer than **10000 characters**, will be **truncated**.</NOTE>
